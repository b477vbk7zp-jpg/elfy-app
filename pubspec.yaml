name: elfy_app
description: "Aplicación Flutter para Patronaje Digital Industrial con cálculos automáticos de medidas y generación de patrones vectoriales."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  isar: ^3.1.0
  path_provider: ^2.1.0
  flutter_stripe: ^11.0.0
  pdf: ^3.10.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true